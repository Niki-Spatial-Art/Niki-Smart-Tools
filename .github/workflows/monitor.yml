name: A-share Market Watch

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Beijing 09:10 and 15:20 on weekdays.
    - cron: '10 1 * * 1-5'
    - cron: '20 7 * * 1-5'

permissions:
  contents: read

jobs:
  market-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt -r requirements-a-stock.txt

      - name: Create public market snapshot
        run: >-
          python tools/a_stock_radar_snapshot.py
          --codes 510300,510500,512100,512880,588000,518880
          --output data/a_stock_market_watch.json

      - name: Upload market snapshot
        uses: actions/upload-artifact@v4
        with:
          name: a-share-market-watch
          path: data/a_stock_market_watch.json
          if-no-files-found: error
          retention-days: 7
