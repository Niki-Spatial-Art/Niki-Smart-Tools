name: Investment Workbench Radar Email

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Radar email type
        required: true
        default: postclose
        type: choice
        options:
          - intraday
          - postclose
  schedule:
    # GitHub cron uses UTC. Beijing time: 10:45 intraday and 15:25 post-close.
    - cron: '45 2 * * 1-5'
    - cron: '25 7 * * 1-5'

permissions:
  contents: read

jobs:
  send-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt -r requirements-a-stock.txt

      - name: Scan market and send radar email
        run: |
          if [ "${{ github.event.schedule }}" = "45 2 * * 1-5" ]; then
            python tools/send_workbench_email_preview.py --intraday
          elif [ "${{ inputs.mode }}" = "intraday" ]; then
            python tools/send_workbench_email_preview.py --intraday
          else
            python tools/send_workbench_email_preview.py
          fi
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
