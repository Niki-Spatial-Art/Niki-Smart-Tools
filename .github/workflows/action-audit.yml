name: Intraday Action Card Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  action-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt -r requirements-a-stock.txt

      - name: Scan market and send conditional action cards
        run: python tools/send_workbench_email_preview.py --intraday
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          INTRADAY_ACTION_CARD_MAX_CAPITAL: "20000"
